name: Update Language Stats
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: stefvuck/github-profile-language-analytics@v1.1.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          visualization_types: "bar"
          dark_mode: true
