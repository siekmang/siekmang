name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }} # Your PAT with 'repo' and 'read:user' scopes
          user: siekmang
          template: classic
          base: header, activity, community, repositories, metadata
          # THIS IS THE KEY FOR ORGS:
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          config_timezone: America/New_York # Or your timezone
