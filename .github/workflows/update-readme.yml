name: Update Projects
on:
  schedule: [{ cron: "0 * * * *" }]
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Top 3 Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Get the 3 most recently updated repos (default behavior)
          # We use --source to hide forks so your 'fun' projects don't clutter the list
          REPOS=$(gh repo list --limit 3 --source --json name,url,description --template '{{range .}}* [{{.name}}]({{.url}}) - {{.description}}{{"\n"}}{{end}}')

          # Use a simpler sed or a temporary file to avoid 'sed' delimiter nightmares
          echo "Recent Projects updated."

          # This replaces everything between the tags with the new list
          sed -i '//,//c\\n'"$REPOS"'\n' README.md

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "chore: update recent projects" || exit 0
          git push
